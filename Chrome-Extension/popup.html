<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AutoForm Fill</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      width: 280px;
      padding: 16px;
      font: 13px/1.4 system-ui, -apple-system, sans-serif;
      color: #111;
      background: #fff;
    }
    h1 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
    button, .toggle { cursor: pointer; }
    #fillBtn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #111;
      color: #fff;
      font: inherit;
      font-weight: 500;
    }
    #fillBtn:hover { background: #333; }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin: 12px 0;
      padding-top: 12px;
      border-top: 1px solid #eee;
    }
    .row label { color: #555; font-size: 12px; }
    .toggle {
      width: 36px;
      height: 20px;
      background: #ddd;
      border-radius: 10px;
      position: relative;
      flex-shrink: 0;
    }
    .toggle.on { background: #111; }
    .toggle::after {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: transform .15s;
    }
    .toggle.on::after { transform: translateX(16px); }
    .foot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      font-size: 11px;
      color: #888;
    }
    .foot a { color: #555; text-decoration: none; }
    .foot a:hover { text-decoration: underline; }
    kbd {
      padding: 1px 4px;
      border: 1px solid #ddd;
      border-radius: 3px;
      font-size: 10px;
      background: #f7f7f7;
    }
  </style>
</head>
<body>
  <h1>AutoForm Fill</h1>
  <button id="fillBtn" type="button">Fill form</button>
  <div class="row">
    <label for="shortcutToggle">Shortcut <kbd>Ctrl+Shift+V</kbd> ×2</label>
    <div id="shortcutToggle" class="toggle on" role="switch" aria-checked="true" tabindex="0"></div>
  </div>
  <div class="foot">
    <span>Fake data for testing</span>
    <a id="settingsLink" href="#">Settings</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
